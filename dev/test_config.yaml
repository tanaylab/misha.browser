# Minimal test configuration for misha.browser development
# Uses mm10 trackdb with a few real tracks

profiles:
  local:
    misha_root: /net/mraid20/ifs/wisdom/tanay_lab/tgdata/db/tgdb/mm10/trackdb

# Starting position - Sox2 locus on chr3
start:
  gene: Sox2
  span_bp: 2000000

# UI Settings
ui:
  title: "mm10 Dev Browser"
  span_default: 2000000
  smooth_window_default: 10
  show_coordinates: true

# Plot settings
plot:
  iterator: 32
  expansion: 12000
  target_points: 4000
  theme: bw

# Navigator for gene selection
navigator:
  source: intervs.global.tss
  label_field: geneSymbol
  extension: 1000000

# Virtual track definitions
vtracks:
  - name: norm_k27
    src: at.EB4_norm_300
    func: sum
    sshift: -140
    eshift: 140
    expression: "pmax(norm_k27, 0)"

# Panel definitions
panels:
  # Gene annotation panel
  - name: genes
    type: annotation
    exon_source: intervs.global.exon
    tss_source: intervs.global.tss
    gene_label_field: geneSymbol
    color: navy
    show_strand_arrows: true
    height: 1

  # Normalized signal panel
  - name: signal
    type: data
    tracks:
      - norm_k27
    transforms:
      - type: smooth
        window: 10
      - type: log2
        offset: 1
    plot_type: line
    ylim: [0, 10]
    y_title: "Signal"
    height: 3
    show_legend: true

  # GC content panel
  - name: gc_content
    type: data
    tracks: [seq.GC200_bin20]
    transforms:
      - type: smooth
        window: 10
    plot_type: line
    color: grey30
    ylim: [0.3, 0.7]
    y_labels: percent
    y_title: "GC %"
    height: 0.8
    show_legend: false

  # CpG content panel
  - name: cpg_content
    type: data
    tracks: [seq.CG_500_mean_new]
    transforms:
      - type: smooth
        window: 10
    plot_type: area
    fill: darkorange
    color: darkorange
    ylim: [0, 0.1]
    y_title: "CpG cont."
    height: 0.8
    show_legend: false
